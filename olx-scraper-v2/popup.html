<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:440px;font-family:'Segoe UI',sans-serif;background:#f5f7fa}
.hdr{background:linear-gradient(135deg,#002f34,#0076d6);color:#fff;padding:14px;text-align:center}
.hdr h1{font-size:17px;margin-bottom:3px}.hdr p{font-size:10px;opacity:.8}
.sec{padding:10px 14px}.stitle{font-size:12px;font-weight:600;color:#002f34;margin-bottom:6px}
.sbox{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:6px;font-size:12px;margin-bottom:6px}
.sbox:focus{outline:none;border-color:#0076d6}
.grid{display:flex;flex-wrap:wrap;gap:4px;max-height:140px;overflow-y:auto;padding:2px}
.cbtn{padding:3px 8px;border:1px solid #ddd;border-radius:12px;background:#fff;font-size:10px;cursor:pointer}
.cbtn:hover{border-color:#0076d6}.cbtn.act{background:#002f34;color:#fff;border-color:#002f34}
.det{background:#e8f5e9;padding:6px 10px;border-radius:6px;font-size:11px;color:#2e7d32;margin-bottom:6px;display:none}
.det.show{display:block}
.cust{display:flex;gap:6px;margin-top:6px}
.cust input{flex:1;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:11px}
.cust button{padding:5px 10px;background:#002f34;color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer}
.btn{width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}
.bp{background:linear-gradient(135deg,#002f34,#0076d6);color:#fff}.bp:hover{opacity:.9}
.bs{background:#dc3545;color:#fff;display:none}.bs.show{display:block}.bp.hide{display:none}
.prog{display:none;margin-top:8px}.prog.show{display:block}
.pbar{height:5px;background:#e0e0e0;border-radius:3px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,#002f34,#0076d6);border-radius:3px;transition:width .3s;width:0%}
.ptxt{font-size:10px;color:#666;margin-top:3px;text-align:center}
.bst{font-size:9px;color:#888;margin-top:2px;text-align:center;max-height:35px;overflow-y:auto}
.dlsec{display:none;padding:10px 14px}.dlsec.show{display:block}
.dlbtns{display:flex;gap:8px}
.dlb{flex:1;padding:7px;border:1px solid #002f34;border-radius:6px;background:#fff;color:#002f34;font-size:11px;font-weight:600;cursor:pointer;text-align:center}
.dlb:hover{background:#e3f2fd}
.st{font-size:11px;color:#666;text-align:center;padding:6px}
.note{font-size:9px;color:#0076d6;text-align:center;padding:2px 14px 6px;font-weight:500}
.tab{display:flex;gap:0;margin-bottom:6px;border-radius:6px;overflow:hidden;border:1px solid #ddd}
.tab button{flex:1;padding:6px;border:none;background:#f5f5f5;font-size:11px;cursor:pointer;font-weight:500}
.tab button.act{background:#002f34;color:#fff}
</style></head><body>
<div class="hdr"><h1>🚗 OLX Scraper v2</h1><p>All cars by brand · Location/Sub-location selector</p></div>
<div class="sec">
  <div class="det" id="det"></div>
  <div class="stitle">Select City</div>
  <input type="text" class="sbox" id="sc" placeholder="Search city...">
  <div class="grid" id="cg"></div>
  <div class="cust"><input type="text" id="cc" placeholder="Custom slug e.g. hyderabad_g4058526"><button id="uc">Use</button></div>
</div>
<div class="sec">
  <div class="stitle">Sub-locations (auto-loaded after city)</div>
  <div class="tab" id="locTab">
    <button class="act" id="locAll">All Areas</button>
    <button id="locSub">Specific Area</button>
  </div>
  <div id="subLocWrap" style="display:none">
    <input type="text" class="sbox" id="slSearch" placeholder="Search sub-location...">
    <div class="grid" id="slGrid"></div>
  </div>
</div>
<div class="sec">
  <button class="btn bp" id="go">Start Scraping ALL Cars</button>
  <button class="btn bs" id="stop">Stop</button>
  <div class="prog" id="prog">
    <div class="pbar"><div class="pfill" id="pf"></div></div>
    <div class="ptxt" id="pt">Initializing...</div>
    <div class="bst" id="bs2"></div>
  </div>
</div>
<div class="dlsec" id="dlsec">
  <div class="stitle">Download Results</div>
  <div class="dlbtns">
    <button class="dlb" id="dj">📄 JSON</button>
    <button class="dlb" id="dc">📊 CSV</button>
  </div>
</div>
<div class="st" id="st">Select a city and click Start</div>
<div class="note">Scrapes ALL brands to bypass OLX page limit · Runs inside OLX tab</div>
<script src="popup.js"></script>
</body></html>
