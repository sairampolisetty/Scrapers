<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 440px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 20px;
    }
    h1 { font-size: 16px; text-align: center; color: #e94560; margin-bottom: 4px; }
    .subtitle { text-align: center; font-size: 11px; color: #8b949e; margin-bottom: 14px; }
    .status-panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      font-size: 12px;
    }
    .status-panel .row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .status-panel .row:last-child { margin-bottom: 0; }
    .label { color: #8b949e; }
    .value { color: #e94560; font-weight: bold; }
    .value.green { color: #7ee787; }
    .btn-group { display: flex; flex-direction: column; gap: 8px; }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 3px 12px rgba(0,0,0,0.4); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-scrape { background: linear-gradient(135deg, #e94560, #c23152); color: white; }
    .btn-deep { background: linear-gradient(135deg, #533483, #7b2d8e); color: white; }
    .btn-json { background: linear-gradient(135deg, #1f6feb, #0f3460); color: white; }
    .btn-csv { background: linear-gradient(135deg, #238636, #196c2e); color: white; }
    .divider { border: none; border-top: 1px solid #21262d; margin: 6px 0; }
    #log {
      background: #010409;
      border: 1px solid #21262d;
      border-radius: 6px;
      padding: 10px;
      margin-top: 12px;
      max-height: 180px;
      overflow-y: auto;
      font-size: 11px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      color: #7ee787;
    }
    .log-entry { margin-bottom: 3px; white-space: pre-wrap; }
    .log-error { color: #f85149; }
    .log-info { color: #58a6ff; }
    .log-warn { color: #d29922; }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
      display: none;
    }
    .progress-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #533483);
      border-radius: 3px;
      transition: width 0.3s;
      width: 0%;
    }
  </style>
</head>
<body>
  <h1>🚗 Autocar Full Reviews Scraper</h1>
  <p class="subtitle">Scrapes listing + full article content → JSON / CSV</p>
  <div class="status-panel">
    <div class="row">
      <span class="label">Status:</span>
      <span class="value" id="status">Ready</span>
    </div>
    <div class="row">
      <span class="label">Reviews on listing:</span>
      <span class="value" id="listCount">0</span>
    </div>
    <div class="row">
      <span class="label">Articles scraped:</span>
      <span class="value green" id="deepCount">0</span>
    </div>
    <div class="progress-bar" id="progressBar">
      <div class="fill" id="progressFill"></div>
    </div>
  </div>
  <div class="btn-group">
    <button class="btn-scrape" id="btnScrapeList">🔍 Step 1: Scrape Listing Page (loads all via "View More")</button>
    <button class="btn-deep" id="btnDeepScrape" disabled>🧠 Step 2: Deep Scrape — Fetch Full Article Content</button>
    <hr class="divider">
    <button class="btn-json" id="btnJSON" disabled>📄 Download JSON</button>
    <button class="btn-csv" id="btnCSV" disabled>📊 Download CSV</button>
  </div>
  <div id="log"></div>
  <script src="popup.js"></script>
</body>
</html>
